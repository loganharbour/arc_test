name: buildkit
on:
  workflow_dispatch:


jobs:
  build:
    runs-on: loganharbour-arctest

    container:
      image: moby/buildkit:latest

    steps:
      - name: Create test Dockerfile
        run: |
          cat > Dockerfile <<'EOF'
          FROM alpine:3.20
          RUN echo "hello from buildkit" > /hello.txt
          CMD ["cat", "/hello.txt"]
          EOF

      - name: Verify BuildKit is reachable
        run: |
          buildctl --addr "$BUILDKIT_HOST" debug workers

      - name: Build to local files only
        run: |
          buildctl build \
            --frontend dockerfile.v0 \
            --local context=. \
            --local dockerfile=. \
            --opt filename=Dockerfile \
            --output type=local,dest=out
