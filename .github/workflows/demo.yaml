name: arc test
on:
  workflow_dispatch:


jobs:
  build:
    runs-on: loganharbour-arctest

    container:
      image: idaholab/moose:2026.03.31-50c4748

    steps:
      - name: copy inputs
        run: moose_test-opt --copy-inputs tests
      - name: run tests
        run: cd moose_test/tests && moose_test-opt --run
